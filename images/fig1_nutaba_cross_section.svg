<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 520" width="680" height="520" font-family="'Helvetica Neue', 'Hiragino Sans', sans-serif">
  <defs>
    <pattern id="water" patternUnits="userSpaceOnUse" width="20" height="6">
      <path d="M0 3 Q5 0 10 3 Q15 6 20 3" fill="none" stroke="#666" stroke-width="0.7"/>
    </pattern>
    <pattern id="ground" patternUnits="userSpaceOnUse" width="8" height="8">
      <circle cx="2" cy="2" r="0.6" fill="#999"/>
      <circle cx="6" cy="6" r="0.6" fill="#999"/>
    </pattern>
    <pattern id="hatch" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#aaa" stroke-width="0.8"/>
    </pattern>
  </defs>

  <!-- Title -->
  <text x="340" y="28" text-anchor="middle" font-size="14" font-weight="bold" fill="#000">図1：ヌタ場の地形的特徴（断面図）</text>

  <!-- Mountain cross-section path -->
  <path d="M30 340 Q80 338 120 300 Q160 260 190 220 Q210 190 230 180 Q250 175 270 210 Q285 235 300 260 Q310 275 320 282 Q325 285 330 282 Q340 275 350 260 Q365 235 380 210 Q400 175 420 180 Q440 190 460 220 Q490 260 520 300 Q560 338 600 340 L650 340"
        fill="none" stroke="#000" stroke-width="2.5"/>

  <!-- Ground fill -->
  <path d="M30 340 Q80 338 120 300 Q160 260 190 220 Q210 190 230 180 Q250 175 270 210 Q285 235 300 260 Q310 275 320 282 Q325 285 330 282 Q340 275 350 260 Q365 235 380 210 Q400 175 420 180 Q440 190 460 220 Q490 260 520 300 Q560 338 600 340 L650 340 L650 400 L30 400 Z"
        fill="url(#hatch)" opacity="0.4"/>

  <!-- Nutaba depression detail (enlarged) -->
  <ellipse cx="325" cy="286" rx="28" ry="8" fill="url(#water)" stroke="#555" stroke-width="1"/>
  <ellipse cx="325" cy="286" rx="28" ry="8" fill="none" stroke="#000" stroke-width="1.2"/>

  <!-- Water surface indication -->
  <path d="M302 284 Q310 281 318 284 Q326 287 334 284 Q342 281 348 284" fill="none" stroke="#444" stroke-width="1"/>
  <path d="M308 288 Q316 285 324 288 Q332 291 340 288" fill="none" stroke="#444" stroke-width="0.8"/>

  <!-- Ridge labels -->
  <text x="200" y="168" text-anchor="middle" font-size="11" font-weight="bold" fill="#000">尾根（凸地形）</text>
  <line x1="200" y1="172" x2="220" y2="182" stroke="#000" stroke-width="1" marker-end="url(#arrowhead)"/>

  <text x="460" y="168" text-anchor="middle" font-size="11" font-weight="bold" fill="#000">尾根（凸地形）</text>
  <line x1="440" y1="172" x2="428" y2="182" stroke="#000" stroke-width="1"/>

  <!-- Valley label -->
  <text x="325" y="310" text-anchor="middle" font-size="10" font-weight="bold" fill="#000">谷筋</text>

  <!-- Nutaba label -->
  <rect x="280" y="242" width="90" height="20" rx="3" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="325" y="256" text-anchor="middle" font-size="11" font-weight="bold" fill="#000">ヌタ場</text>
  <line x1="325" y1="262" x2="325" y2="278" stroke="#000" stroke-width="1.2" stroke-dasharray="3,2"/>

  <!-- ===== ANNOTATION 1: Slope ===== -->
  <g transform="translate(42, 195)">
    <rect x="0" y="0" width="130" height="58" rx="4" fill="#fff" stroke="#000" stroke-width="1.2"/>
    <text x="65" y="16" text-anchor="middle" font-size="10" font-weight="bold" fill="#000">① 傾斜度 (Slope)</text>
    <!-- Angle indicator -->
    <line x1="20" y1="48" x2="80" y2="48" stroke="#000" stroke-width="1"/>
    <line x1="20" y1="48" x2="75" y2="33" stroke="#000" stroke-width="1"/>
    <path d="M45 48 A25 25 0 0 1 50 40" fill="none" stroke="#000" stroke-width="1"/>
    <text x="58" y="46" font-size="8" fill="#000">3°〜10°</text>
    <text x="95" y="36" font-size="9" fill="#000">緩傾斜</text>
  </g>
  <line x1="172" y1="224" x2="260" y2="245" stroke="#000" stroke-width="0.8" stroke-dasharray="4,3"/>

  <!-- ===== ANNOTATION 2: Curvature ===== -->
  <g transform="translate(508, 195)">
    <rect x="0" y="0" width="140" height="58" rx="4" fill="#fff" stroke="#000" stroke-width="1.2"/>
    <text x="70" y="16" text-anchor="middle" font-size="10" font-weight="bold" fill="#000">② 曲率 (Curvature)</text>
    <!-- Concave curve -->
    <path d="M20 45 Q70 28 120 45" fill="none" stroke="#000" stroke-width="1.5"/>
    <text x="70" y="38" text-anchor="middle" font-size="9" fill="#000">正の値 = 凹</text>
    <line x1="70" y1="40" x2="70" y2="48" stroke="#000" stroke-width="0.8" marker-end="url(#arr)"/>
  </g>
  <line x1="508" y1="224" x2="395" y2="255" stroke="#000" stroke-width="0.8" stroke-dasharray="4,3"/>

  <!-- ===== ANNOTATION 3: TPI ===== -->
  <g transform="translate(75, 345)">
    <rect x="0" y="0" width="155" height="62" rx="4" fill="#fff" stroke="#000" stroke-width="1.2"/>
    <text x="77" y="16" text-anchor="middle" font-size="10" font-weight="bold" fill="#000">③ TPI（地形位置指数）</text>
    <!-- Arrows showing surrounding is higher -->
    <text x="77" y="32" text-anchor="middle" font-size="9" fill="#000">周囲より低い = 負の値</text>
    <!-- Mini diagram -->
    <line x1="30" y1="52" x2="30" y2="42" stroke="#000" stroke-width="1.2"/>
    <polygon points="27,44 30,38 33,44" fill="#000"/>
    <rect x="55" y="48" width="20" height="8" fill="#ccc" stroke="#000" stroke-width="0.8"/>
    <line x1="100" y1="52" x2="100" y2="42" stroke="#000" stroke-width="1.2"/>
    <polygon points="97,44 100,38 103,44" fill="#000"/>
    <text x="25" y="57" font-size="7" fill="#000">高</text>
    <text x="60" y="57" font-size="7" fill="#000">低(窪地)</text>
    <text x="96" y="57" font-size="7" fill="#000">高</text>
  </g>
  <line x1="230" y1="370" x2="300" y2="290" stroke="#000" stroke-width="0.8" stroke-dasharray="4,3"/>

  <!-- ===== ANNOTATION 4: Shape Ratio (top view) ===== -->
  <g transform="translate(448, 345)">
    <rect x="0" y="0" width="200" height="100" rx="4" fill="#fff" stroke="#000" stroke-width="1.2"/>
    <text x="100" y="16" text-anchor="middle" font-size="10" font-weight="bold" fill="#000">④ 形状比（上面図で対比）</text>

    <!-- Round depression = Nutaba -->
    <text x="55" y="34" text-anchor="middle" font-size="8" fill="#000">丸い窪地</text>
    <ellipse cx="55" cy="55" rx="22" ry="20" fill="#ddd" stroke="#000" stroke-width="1.5"/>
    <text x="55" y="58" text-anchor="middle" font-size="8" font-weight="bold" fill="#000">≒1.0</text>
    <text x="55" y="82" text-anchor="middle" font-size="8" fill="#000">= ヌタ場候補</text>
    <text x="55" y="95" text-anchor="middle" font-size="9" fill="#000">✓ 高評価</text>

    <!-- Elongated valley = not Nutaba -->
    <text x="150" y="34" text-anchor="middle" font-size="8" fill="#000">細長い沢筋</text>
    <ellipse cx="150" cy="55" rx="35" ry="12" fill="#eee" stroke="#000" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="150" y="58" text-anchor="middle" font-size="8" fill="#000">≧3.0</text>
    <text x="150" y="82" text-anchor="middle" font-size="8" fill="#000">= 沢・水路</text>
    <text x="150" y="95" text-anchor="middle" font-size="9" fill="#555">× 除外</text>
  </g>
  <line x1="448" y1="390" x2="365" y2="290" stroke="#000" stroke-width="0.8" stroke-dasharray="4,3"/>

  <!-- Scale bar -->
  <line x1="30" y1="420" x2="650" y2="420" stroke="#000" stroke-width="0.5"/>

  <!-- Footer -->
  <text x="340" y="510" text-anchor="middle" font-size="8" fill="#888">Hunter Magazine vol.2 — ヌタ場予測アルゴリズム解説</text>
</svg>